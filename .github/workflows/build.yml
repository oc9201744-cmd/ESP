name: Otomatik Derleme (Theos)

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Tweak Derleme İşlemi
    runs-on: macos-latest

    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      - name: Projeyi İndir (Checkout)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Gerekli Paketleri Kur
        run: |
          brew install ldid xz

      - name: Theos Ortamını Hazırla
        run: |
          # Temiz bir kurulum için varsa eski dizini siliyoruz
          rm -rf ${{ env.THEOS }}
          git clone --recursive https://github.com/theos/theos.git ${{ env.THEOS }}

      - name: iOS SDK'larını Güncelle
        run: |
          # Çakışmayı önlemek için mevcut boş sdks klasörünü siliyoruz
          rm -rf ${{ env.THEOS }}/sdks
          git clone https://github.com/theos/sdks.git ${{ env.THEOS }}/sdks

      - name: Projeyi Derle
        run: |
          # Makefile içindeki değişkenleri kullanarak derleme yapar
          make clean
          make -j$(sysctl -n hw.ncpu)
          
          # Eğer .deb paketi oluşturmak istiyorsanız aşağıdaki satırı aktif edin:
          # make package FINALPACKAGE=1

      - name: Çıktıları Kaydet (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: ESP-Derleme-Ciktilari
          path: |
            .theos/obj/**/*.dylib
            packages/*.deb
