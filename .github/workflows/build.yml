# Bu iş akışının adı
name: Projeyi Derle

# Bu iş akışının ne zaman tetikleneceğini belirler
on:
  # Main branch'e yapılan her push işleminde çalışır
  push:
    branches: [ "main" ]
  # Main branch'e yönelik her pull request'te çalışır
  pull_request:
    branches: [ "main" ]

jobs:
  # "build" adında tek bir görev tanımlar
  build:
    # Görevin çalışacağı işletim sistemini belirtir (macOS'in en son sürümü)
    runs-on: macos-latest

    steps:
    # 1. Adım: Kodları Checkout Etme (v4)
    # Deponuzdaki kodları çalıştırılacak ortama indirir.
    - name: Kodları Checkout Et
      uses: actions/checkout@v4
      with:
        # Theos'u bir alt modül olarak kullanıyorsanız bu satırı aktif edin
        # submodules: 'recursive'

    # 2. Adım: Theos Kurulumu
    # iOS Tweak geliştirme ortamı olan Theos'u kurar.
    - name: Theos Kurulumu
      uses: Theos/install-theos@v1

    # 3. Adım: Projeyi Derleme
    # Makefile dosyanızdaki talimatlara göre projeyi derler.
    - name: Projeyi Derle
      run: make

    # 4. Adım: Derlenmiş Dosyaları Arşivleme (v4)
    # Derleme sonucu oluşan .deb paketini daha sonra indirebilmek için arşivler.
    # v4 ile 'path' altında birden fazla dosya/dizin belirtmek daha kolaydır.
    - name: Derlenmiş Dosyaları Arşivle
      uses: actions/upload-artifact@v4
      with:
        name: ESP-Tweak-Package
        path: packages/*.deb
