name: Otomatik Derleme (Theos)

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # GitHub arayüzünden manuel tetikleme sağlar

jobs:
  build:
    name: Build Tweak
    runs-on: macos-latest

    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      - name: Projeyi İndir (Checkout)
        uses: actions/checkout@v4
        with:
          submodules: recursive # Eğer ImGui vb. kütüphaneler submodule ise gerekli

      - name: Gerekli Paketleri Kur
        run: |
          brew install ldid xz

      - name: Theos'u Kur
        run: |
          git clone --recursive https://github.com/theos/theos.git ${{ env.THEOS }}

      - name: iOS SDK'larını Kur
        run: |
          git clone https://github.com/theos/sdks.git ${{ env.THEOS }}/sdks

      - name: Projeyi Derle
        run: |
          make clean
          make
          # Eğer projenizde 'control' dosyası varsa ve .deb paketi oluşturmak istiyorsanız 
          # aşağıdaki satırın başındaki # işaretini kaldırın:
          # make package

      - name: Çıktıları Yükle (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: ESP-Derlenmis-Dosyalar
          path: |
            .theos/obj/**/*.dylib
            packages/*.deb
