name: Projeyi Derle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Kodları Checkout Et
      uses: actions/checkout@v4
      with:
        # submodules: 'recursive' # Eğer alt modül kullanıyorsanız bu satırı aktif edin

    - name: Theos Kurulumu
      uses: Theos/install-theos@v1

    # 'id' ekleyerek bu adımın sonucunu daha sonra kullanabiliriz
    - name: Projeyi Derle
      id: build_step
      run: make

    # YENİ ADIM: Derleme çıktısını kontrol et
    # Bu adım, 'packages' dizinini ve içindekileri listeleyerek hata ayıklamayı kolaylaştırır.
    # 'if: always()' sayesinde önceki adım başarısız olsa bile çalışır.
    - name: Derleme Çıktısını Kontrol Et
      if: always()
      run: |
        echo "Derleme sonrası dosya yapısı kontrol ediliyor..."
        ls -R

    # DÜZELTİLMİŞ ADIM: Derlenmiş Dosyaları Arşivle
    # Sadece 'build_step' başarılı olduğunda çalışır.
    # Bu, 'make' komutu hata verirse bu adımın atlanmasını ve hata vermemesini sağlar.
    - name: Derlenmiş Dosyaları Arşivle
      uses: actions/upload-artifact@v4
      if: steps.build_step.outcome == 'success'
      with:
        name: ESP-Tweak-Package
        path: packages/*.deb
